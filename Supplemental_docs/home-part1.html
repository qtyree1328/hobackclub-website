<!-- INJECTABLE: Home Part 1 — Mountain drawing hero + image carousel -->
<style>
    body { background-color: #ede9e1 !important; overflow-x: hidden !important; }
    html { overflow-x: hidden !important; }
    .hb-section {
    width: 100%; max-width: 100vw; position: relative;
    left: 50%; right: 50%; margin-left: -50vw; margin-right: -50vw;
    margin-top: 0; margin-bottom: 0; box-sizing: border-box; overflow-x: hidden;
    }
    .hb-hero-mtn { background: #ede9e1; padding: 80px 0; overflow: hidden; }
    .hb-hero-mtn-inner { display: flex; align-items: center; max-width: 1400px; margin: 0 auto; }
    .hb-hero-mtn-img { flex: 0 0 60%; margin-left: -80px; }
    .hb-hero-mtn-img img { width: 100%; max-width: 950px; opacity: 0.55; display: block; }
    .hb-hero-mtn-text { flex: 1; padding: 0 60px 0 40px; text-align: right; }
    .hb-hero-mtn-headline {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: clamp(3.2rem, 5vw, 4.8rem); font-weight: 300; color: #1e2d3a; line-height: 1.1; margin: 0 0 40px;
    }
    .hb-hero-mtn-btn {
    display: inline-block; padding: 20px 52px; background: #1e2d3a; color: #fff;
    font-family: 'Lato', Helvetica, Arial, sans-serif; font-size: 0.95rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.2em; transition: background 0.3s; text-decoration: none;
    }
    .hb-hero-mtn-btn:hover { background: #365e75; }
    .hb-gallery { background: #ede9e1; padding: 30px 0 40px; overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .hb-gallery::-webkit-scrollbar { display: none; }
    .hb-gallery__track { display: flex; align-items: center; gap: 32px; padding: 0; width: max-content; }
    .hb-gallery__slide { flex-shrink: 0; border-radius: 10px; overflow: hidden; }
    .hb-gallery__slide img { display: block; width: 100%; height: 100%; object-fit: cover; }
    @media (max-width: 1200px) { .hb-hero-mtn-inner { max-width: 100%; } .hb-hero-mtn-headline { font-size: 2.8rem; } }
    @media (max-width: 768px) {
    .hb-hero-mtn { padding: 40px 0; }
    .hb-hero-mtn-inner { flex-direction: column; align-items: center; }
    .hb-hero-mtn-img { flex: none; margin-left: 0; margin-bottom: 20px; width: 90%; max-width: 500px; }
    .hb-hero-mtn-img img { opacity: 0.4; }
    .hb-hero-mtn-text { padding: 0 24px; text-align: center; }
    .hb-hero-mtn-headline { font-size: 2.2rem; margin-bottom: 24px; }
    .hb-hero-mtn-btn { padding: 14px 32px; font-size: 0.8rem; }
    .hb-gallery { padding: 12px 0 20px; }
    .hb-gallery__track { gap: 10px; }
    }
    @media (max-width: 480px) {
    .hb-hero-mtn { padding: 30px 0; }
    .hb-hero-mtn-img { width: 95%; }
    .hb-hero-mtn-headline { font-size: 1.8rem; margin-bottom: 20px; }
    .hb-hero-mtn-btn { padding: 12px 28px; font-size: 0.75rem; }
    }
</style>

<section class="hb-section hb-hero-mtn">
<div class="hb-hero-mtn-inner">
<div class="hb-hero-mtn-img">
<img src="https://mcusercontent.com/c4b9546b92e82ffccc39aa16c/images/3014529e-7a5a-646a-3a9c-32e89256771c.png" alt="Teton Mountains Sketch">
</div>
<div class="hb-hero-mtn-text">
<h2 class="hb-hero-mtn-headline">Experience the Hoback Club</h2>
<a href="https://hobackclub.com/default.aspx?p=dynamicpage&amp;pageid=425178" class="hb-hero-mtn-btn">Learn More</a>
</div>
</div>
</section>

<section class="hb-section hb-gallery" id="hbGallery">
<div class="hb-gallery__track" id="hbGalleryTrack"></div>
</section>

<script>
(function() {
  var anchor = document.querySelector('.hb-section');
  if (anchor) {
    var el = anchor.parentElement;
    while (el && el !== document.body && el !== document.documentElement) {
      el.style.padding = '0'; el.style.margin = '0';
      el.style.background = 'transparent'; el.style.backgroundColor = 'transparent';
      el.style.maxWidth = 'none'; el.style.overflow = 'visible';
      el = el.parentElement;
    }
  }
  var IMAGES = [
    { src: "images/dynamic/getImage.gif?ID=100196", scale: 1.3, aspect: 0.65 },
    { src: "images/dynamic/getImage.gif?ID=100149", scale: 1.4, aspect: 0.6 },
    { src: "images/dynamic/getImage.gif?ID=100151", scale: 0.8, aspect: 1.25 },
    { src: "images/dynamic/getImage.gif?ID=100195", scale: 0.85, aspect: 1.1 },
    { src: "images/dynamic/getImage.gif?ID=100152", scale: 1.6, aspect: 0.5 },
    { src: "images/dynamic/getImage.gif?ID=100156", scale: 0.9, aspect: 1.0 },
    { src: "images/dynamic/getImage.gif?ID=100167", scale: 1.3, aspect: 0.7 },
    { src: "images/dynamic/getImage.gif?ID=100192", scale: 1.1, aspect: 0.75 },
    { src: "images/dynamic/getImage.gif?ID=100170", scale: 0.75, aspect: 1.35 },
    { src: "images/dynamic/getImage.gif?ID=100169", scale: 1.5, aspect: 0.55 },
    { src: "images/dynamic/getImage.gif?ID=100172", scale: 1.0, aspect: 0.85 }
  ];
  var track = document.getElementById('hbGalleryTrack');
  var container = document.getElementById('hbGallery');
  if (!track || !container) return;
  var vw = window.innerWidth;
  var BASE = vw < 480 ? 100 : vw < 768 ? 150 : 380;
  var GAP = vw < 480 ? 10 : vw < 768 ? 14 : 32;
  function makeSlide(item) {
    var w = Math.round(BASE * (item.scale || 1));
    var s = document.createElement('div');
    s.className = 'hb-gallery__slide';
    s.style.width = w + 'px';
    s.style.height = Math.round(w * (item.aspect || 0.75)) + 'px';
    var img = document.createElement('img');
    img.src = item.src; img.alt = 'Hoback Club'; img.loading = 'lazy';
    s.appendChild(img); return s;
  }
  for (var c = 0; c < 3; c++) { IMAGES.forEach(function(item) { track.appendChild(makeSlide(item)); }); }
  var allSlides = track.querySelectorAll('.hb-gallery__slide');
  var oneSet = 0;
  for (var i = 0; i < IMAGES.length; i++) { oneSet += allSlides[i].offsetWidth + GAP; }
  var startSlide = allSlides[2];
  if (startSlide) { container.scrollLeft = startSlide.offsetLeft - (container.offsetWidth / 2) + (startSlide.offsetWidth / 2); }
  var speed = 0.25, paused = false, timer;
  function drift() { if (!paused) { container.scrollLeft += speed; if (container.scrollLeft >= oneSet) container.scrollLeft -= oneSet; } requestAnimationFrame(drift); }
  requestAnimationFrame(drift);
  function pause() { paused = true; clearTimeout(timer); }
  function resume() { clearTimeout(timer); timer = setTimeout(function() { paused = false; }, 2000); }
  container.addEventListener('mouseenter', pause);
  container.addEventListener('mouseleave', resume);
  container.addEventListener('touchstart', pause, { passive: true });
  container.addEventListener('touchend', resume, { passive: true });
})();
</script>
